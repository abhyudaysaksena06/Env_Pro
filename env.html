<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenScore</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style2.css" />
  </head>

  <body>
    <!-- BACKGROUND -->
    <div class="bg"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="cursor-glow"></div>

    <!-- NAV -->
    <nav class="nav">
      <div class="container nav-inner">
        <div class="logo">GreenScore</div>
        <div class="nav-links">
          <a href="#">Home</a>
          <a href="#leaderboard">Leaderboard</a>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div class="container hero-inner">
        <div class="hero-box">
          <h1 class="fade-in">
            Future of <br />
            <span>Sustainability</span>
          </h1>

          <p class="fade-in delay">
            Real-time environmental intelligence across systems.
          </p>

          <div class="hero-chips">
            <div class="chip">💧 Water</div>
            <div class="chip">♻ Waste</div>
            <div class="chip">🌫 Carbon</div>
            <div class="chip">🔌 E-Waste</div>
          </div>
        </div>
      </div>
    </section>

    <!-- STATS -->
    <section class="stats">
      <div class="container stats-inner">
        <div class="stat">
          <h2 class="counter" data-target="76">0</h2>
          <p>Average Score</p>
        </div>

        <div class="stat">
          <h2 class="counter" data-target="320">0</h2>
          <p>Users</p>
        </div>

        <div class="stat">
          <h2 class="counter" data-target="12">0</h2>
          <p>Hostels</p>
        </div>
      </div>
    </section>

    <!-- METRICS -->
    <section class="metrics-strip">
      <div class="container">
        <div class="metrics-inner">
          <div>💧 Water</div>
          <div>♻ Waste</div>
          <div>🌫 Carbon</div>
          <div>🔌 E-Waste</div>
        </div>
      </div>
    </section>

    <!-- LEADERBOARD -->
    <section class="leaderboard" id="leaderboard">
      <div class="container">
        <h2>Top Hostels</h2>
        <div class="cards" id="hostelCards"></div>
      </div>
    </section>

    <section class="leaderboard">
      <div class="container">
        <h2>Top Individuals</h2>
        <div class="cards" id="individualCards"></div>
      </div>
    </section>

    <footer>Resource Equilibrium Project · 2026</footer>

    <script src="script.js"></script>
  </body>
</html>
